# Integration test profile — Testcontainers injects JDBC URL via @DynamicPropertySource
spring.docker.compose.enabled=false

# Disable Solr (no Solr container in tests)
desk.solr-url=

# Disable plugins and indexing
desk.plugins.enabled=false
desk.indexing.enabled=false

# File service uses temp directory
desk.file-service.base-dir=${java.io.tmpdir}/desk-itest-files

# Auth enabled (tests exercise JWT flow)
desk.auth.enabled=true
desk.auth.instance-id=desk-itest

# Disable layout proxy
desk.layout.enabled=false

# Disable config system (avoids scanning config resources)
desk.config.enabled=false

# Disable changes feed scheduled tasks
desk.changes.enabled=false

# Flyway baseline-on-migrate for fresh container DB
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.locations=classpath:db/migration,classpath:com/atex/desk/api/migration
