services:
  desk-api:
    image: eclipse-temurin:25-jre
    ports:
      - '8081:8081'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://host.docker.internal:43306/desk?useSSL=false&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=desk
      - SPRING_DATASOURCE_PASSWORD=Lmj4mOIJQNSsEiqPuSDN8yN
      - DESK_SOLR_URL=http://host.docker.internal:48984/solr
      - DESK_FILE_SERVICE_BASE_DIR=/data/files
      - DESK_IMAGE_SERVICE_ENABLED=true
      - DESK_IMAGE_SERVICE_URL=http://desk-image:8090
      - DESK_IMAGE_METADATA_SERVICE_URL=http://image-metadata:8080
      - DESK_IMAGE_METADATA_SERVICE_ENABLED=true
    volumes:
      - ./build/libs:/app/libs:ro
      - adm-alliedpress_file-data:/data/files
    working_dir: /app
    command: java -jar libs/desk-api-0.0.1-SNAPSHOT.jar
    restart: unless-stopped

  image-metadata:
    image: docker-registry.atex.com/atex/image-metadata-service:2.0.0
    ports:
      - '8082:8080'
    environment:
      - FILE_SERVICE_URI=http://desk-api:8081/file
      - IMAGE_SERVICE_URI=http://desk-image:8090/image
      - CONTENT_SERVICE_URI=http://desk-api:8081
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:8080/extractor/image').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

  desk-image:
    build:
      context: ./desk-image
      dockerfile: Dockerfile
    ports:
      - '8090:8090'
    environment:
      - RUST_LOG=desk_image=info
      - DESK_IMAGE_HOST=0.0.0.0
      - DESK_IMAGE_PORT=8090
      - DESK_IMAGE_SECRET=changeme
      - DESK_IMAGE_STORAGE_BACKEND=local
      - DESK_IMAGE_LOCAL_DIR=/data/files
    volumes:
      - adm-alliedpress_file-data:/data/files:ro
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8090/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped

volumes:
  adm-alliedpress_file-data:
    external: true
